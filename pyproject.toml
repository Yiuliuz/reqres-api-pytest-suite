[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v -ra"
markers = [
    "api: tests related to API testing",
    "smoke: critical and fast tests",
    "regression: regression tests",
    "live: tests that make real requests against Reqres",
    "contract: tests that validate expected response structure",
    "read_only: tests that only read data from the API",
    "write: tests that create or update API data",
    "destructive: tests that can change API state",
]
